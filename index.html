<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="T&K Photo is a restrained online photography exhibition shaped by light, narrative, and generous white space."
    />
    <meta property="og:title" content="T&K Photo" />
    <meta
      property="og:description"
      content="A quiet online photography exhibition with curated albums, exhibition-style sequencing, and single-work detail views."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <title>T&K Photo | Online Photography Exhibition</title>
    <script>
      (() => {
        const storageKey = 'tk-photo-theme'
        const savedTheme = localStorage.getItem(storageKey)
        const theme =
          savedTheme ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light')
        document.documentElement.classList.toggle('dark', theme === 'dark')
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
